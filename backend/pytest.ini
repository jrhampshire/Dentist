[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --cov=backend --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml --cov-fail-under=75
markers =
    unit: Unit tests (fast, no DB)
    integration: Integration tests (DB required)
    contract: Contract tests (external API mocking)
    e2e: End-to-end tests (full flow)
    slow: Tests that take longer than 1 second
