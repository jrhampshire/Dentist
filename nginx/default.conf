# =============================================================================
# ClínicaSaaS Dental MX — Nginx Configuration
# =============================================================================
# TLS termination, reverse proxy to Django, static file serving, rate limiting
# =============================================================================

# Rate limiting zone — 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=30r/s;

# Upstream for Django backend
upstream django_backend {
    server django:8000;
}

# Upstream for production frontend SPA
upstream frontend_prod {
    server frontend-prod:80;
}

# Redirect HTTP to HTTPS (uncomment when TLS certs are configured)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Max upload size (for patient documents, CFDI attachments)
    client_max_body_size 10m;

    # -----------------------------------------------------------------------
    # Health check endpoint
    # -----------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # -----------------------------------------------------------------------
    # API — Reverse proxy to Django (rate limited)
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts for long-running operations (CFDI stamping)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket support (for future real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # -----------------------------------------------------------------------
    # Admin — Django admin panel (rate limited)
    # -----------------------------------------------------------------------
    location /admin/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Static files — Django collectstatic output
    # -----------------------------------------------------------------------
    location /static/ {
        limit_req zone=static_limit burst=50 nodelay;

        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Media files — User uploads (patient documents, CFDI PDFs/XMLs)
    # -----------------------------------------------------------------------
    location /media/ {
        limit_req zone=static_limit burst=50 nodelay;

        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";

        # Prevent execution of uploaded files
        location ~* \.(php|py|pl|cgi|sh|bash)$ {
            deny all;
        }
    }

    # -----------------------------------------------------------------------
    # Frontend — Production SPA served by frontend-prod (nginx)
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://frontend_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # -----------------------------------------------------------------------
    # Deny access to hidden files
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

